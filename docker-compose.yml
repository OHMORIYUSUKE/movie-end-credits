services:
  api:
    build:
      context: ./api
    expose:
      - "8000"
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - KV_PATH=/app/data/kv.sqlite
      - TZ=Asia/Tokyo
    volumes:
      - ./api/data:/app/data
    healthcheck:
      test: ["CMD", "deno", "eval", "await fetch('http://localhost:8000/api/credits')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    expose:
      - "3000"
    environment:
      - DENO_API_BASE=http://api:8000/api
      - NEXT_PUBLIC_CLIENT_API_BASE=/api
      - TZ=Asia/Tokyo
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: caddy:2.7-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started

  remotion:
    build:
      context: .
      dockerfile: Dockerfile.remotion
    ports:
      - "3001:3001"
    environment:
      - REMOTION_API_URL=http://${DOMAIN}/api
      - NODE_OPTIONS=--max-old-space-size=4096
      - TZ=Asia/Tokyo
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  caddy_data:
  caddy_config:
